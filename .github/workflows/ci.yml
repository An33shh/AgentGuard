name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check agentguard/ api/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-rust:
    name: Test with Rust extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: agentguard_rs/target
          key: rust-${{ hashFiles('agentguard_rs/Cargo.toml', 'agentguard_rs/src/lib.rs') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build and install Rust extension
        run: maturin develop --release --manifest-path agentguard_rs/Cargo.toml

      - name: Confirm Rust extension loaded
        run: python -c "from agentguard.policy._native import RUST_AVAILABLE; assert RUST_AVAILABLE"

      - name: Run tests with Rust extension active
        run: pytest tests/ -v --tb=short

  secrets-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
