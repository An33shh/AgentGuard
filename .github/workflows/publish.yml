name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  secrets-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check agentguard/ api/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Verify wheel contents (no secrets or sensitive files)
        run: |
          python - << 'EOF'
          import zipfile, sys, pathlib

          BANNED = {".env", ".env.example", "credentials", "id_rsa", "id_ed25519", ".pem", ".key"}
          wheel = next(pathlib.Path("dist").glob("*.whl"))
          bad = [f for f in zipfile.ZipFile(wheel).namelist()
                 if any(b in f for b in BANNED)]
          if bad:
              print(f"BLOCKED: sensitive files in wheel: {bad}")
              sys.exit(1)
          print(f"OK: {wheel.name} — {len(zipfile.ZipFile(wheel).namelist())} files, none sensitive")
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
