version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5747:5432"
    environment:
      POSTGRES_USER: agentguard
      POSTGRES_PASSWORD: agentguard
      POSTGRES_DB: agentguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6747:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env.dev
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://agentguard:agentguard@postgres:5432/agentguard
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  agentguard-api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8747
    ports:
      - "8747:8747"
    env_file:
      - .env.dev
      - path: .env
        required: false
    environment:
      ENV: development
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://agentguard:agentguard@postgres:5432/agentguard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3747:3747"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8747
    depends_on:
      - agentguard-api

volumes:
  postgres_data:
  redis_data:
